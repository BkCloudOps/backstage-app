name: Build & Push Backstage (Host Build)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_DIR: dev-stage
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/backstage

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: dev-stage/yarn.lock

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install --immutable

      - name: TypeScript build (tsc)
        working-directory: ${{ env.APP_DIR }}
        run: yarn tsc

      - name: Build backend bundle
        working-directory: ${{ env.APP_DIR }}
        run: yarn build:backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest